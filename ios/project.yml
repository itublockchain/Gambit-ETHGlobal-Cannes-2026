name: Gambit
options:
  bundleIdPrefix: com.gambit
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""

targets:
  Gambit:
    type: application
    platform: iOS
    sources:
      - path: Gambit
        excludes:
          - "**/.DS_Store"
      - path: Shared
        excludes:
          - "**/.DS_Store"
    dependencies:
      - framework: DynamicSDK/Frameworks/DynamicSDKSwift.xcframework
        embed: true
      - framework: DynamicSDK/Frameworks/SwiftBigInt.xcframework
        embed: true
      - framework: DynamicSDK/Frameworks/SolanaWeb3.xcframework
        embed: true
      - framework: DynamicSDK/Frameworks/AnyCodableSwift.xcframework
        embed: true
      - target: GambitWatch
    settings:
      base:
        INFOPLIST_GENERATION_MODE: GeneratedFile
        PRODUCT_BUNDLE_IDENTIFIER: com.baris.gambit.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: "YES"
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: "YES"
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_NSLocalNetworkUsageDescription: "Gambit needs local network access to connect to the trading server."
    info:
      path: Gambit/Info.plist
      properties:
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        NSLocalNetworkUsageDescription: "Gambit needs local network access to connect to the trading server."
        NSBonjourServices:
          - _http._tcp
    entitlements:
      path: Gambit/Gambit.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.baris.gambit.app

  GambitWatch:
    type: application
    platform: watchOS
    sources:
      - path: GambitWatch
        excludes:
          - "**/.DS_Store"
          - Complications
      - path: Shared
        excludes:
          - "**/.DS_Store"
    dependencies:
      - target: GambitWatchWidgetExtension
    settings:
      base:
        INFOPLIST_GENERATION_MODE: GeneratedFile
        PRODUCT_BUNDLE_IDENTIFIER: com.baris.gambit.app.watch
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_KEY_WKCompanionAppBundleIdentifier: com.baris.gambit.app
        INFOPLIST_KEY_WKRunsIndependentlyOfCompanionApp: "YES"
    info:
      path: GambitWatch/Info.plist
      properties:
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        NSLocalNetworkUsageDescription: "Gambit Watch needs local network access for trading."
        NSBonjourServices:
          - _http._tcp
    entitlements:
      path: GambitWatch/GambitWatch.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.baris.gambit.app

  GambitWatchWidgetExtension:
    type: app-extension
    platform: watchOS
    sources:
      - path: GambitWatch/Complications
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        INFOPLIST_GENERATION_MODE: GeneratedFile
        PRODUCT_BUNDLE_IDENTIFIER: com.baris.gambit.app.watch.widget
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: "YES"
    info:
      path: GambitWatch/Complications/Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
